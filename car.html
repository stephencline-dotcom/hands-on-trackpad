<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trackpad Hand Trainer - Car Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="car-page" data-game-active-key="carGameActive">
    <main class="page game-shell">
      <header class="game-header">
        <a class="home-btn" href="index.html" aria-label="Return to home page">
          <img class="home-btn-icon" src="images/home-icon.svg" alt="" aria-hidden="true" />
          <span>Home</span>
        </a>
        <div class="game-heading">
          <h1 class="game-title">Road Dash</h1>
        </div>
        <button id="carVolumeToggle" class="car-volume-toggle" type="button" aria-label="Mute sound">&#128266;</button>
      </header>

      <p class="game-instructions">Click START, then steer your car to avoid crashes and survive each level.</p>

      <section class="game-stats" aria-live="polite">
        <div class="game-stat">
          <span class="label">Level</span>
          <span id="carLevelBadge" class="value car-level-badge">Level 1 of 6</span>
        </div>
        <div class="game-stat">
          <span class="label">Hits</span>
          <span id="carHitsBadge" class="value car-hits-badge">Hits 0/3</span>
        </div>
        <div class="game-stat">
          <span class="label">Dodged</span>
          <span id="carDodgedBadge" class="value car-dodged-badge">Dodged 0</span>
        </div>
      </section>
      <div id="carToast" class="car-toast game-preserve-only" role="status" aria-live="polite" hidden></div>

      <section class="game-stage" aria-label="Car game area">
        <section class="playfield" aria-label="Road board play area">
          <div class="car-ui">
            <div id="carBoard" class="car-board" aria-label="Road board" tabindex="0">
              <div id="carFuelBadge" class="car-fuel-badge" role="status" aria-live="polite" aria-label="Fuel level">
                <span class="car-fuel-label">Fuel</span>
                <div class="car-fuel-meter" aria-hidden="true">
                  <div id="carFuelFill" class="car-fuel-fill"></div>
                </div>
                <span id="carFuelText" class="car-fuel-text">100%</span>
              </div>
              <div class="car-road" aria-hidden="true">
                <div class="car-center-line"></div>
              </div>
              <div id="carObstacles" class="car-obstacles" aria-hidden="true"></div>
              <img id="playerCar" class="car-player" src="images/car.png" alt="Player car" draggable="false" />
              <button id="carStart" class="car-start" type="button">START</button>
              <div id="carFinishBanner" class="car-finish-banner" hidden>
                <div class="car-finish-card">
                  <p class="car-finish-eyebrow">Level 6 Complete</p>
                  <h2 class="car-finish-title">Way to go!</h2>
                  <p class="car-finish-copy">You finished every level on Road Dash.</p>
                  <div class="car-finish-actions">
                    <button id="carPlayAgainBtn" class="car-finish-btn" type="button">Play Again</button>
                    <a class="car-finish-home" href="index.html" aria-label="Go to home page">Home</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>

      <section class="pad-dock game-guide" aria-label="Trackpad Guide">
        <p class="pad-label">Trackpad Guide</p>
        <section id="scene" class="scene" aria-label="Interactive trackpad trainer">
          <img class="trackpad" src="images/trackpad.png" alt="Trackpad" draggable="false" />
          <img id="leftHand" class="hand left-hand" src="images/left-hand-transparent.png" alt="Left hand" draggable="false" />
          <img id="rightHand" class="hand right-hand" src="images/right-hand-transparent.png" alt="Right hand" draggable="false" />
          <div id="pressIndicator" class="press-indicator" aria-hidden="true"></div>
        </section>
      </section>
    </main>

    <script src="game-access.js"></script>
    <script src="movement-mode.js"></script>
    <script src="trackpad-guide.js"></script>
    <script src="car-game.js"></script>
  </body>
</html>
