<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jack Jump Drag Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="jack-jump-page" data-game-active-key="jackGameActive">
    <main class="jack-jump-shell game-shell">
      <section class="jack-jump-card" aria-label="Jack jump game">
        <header class="jack-jump-header game-header">
          <a class="jack-jump-home" href="index.html" aria-label="Back to home">Home</a>
          <div class="game-heading">
            <p class="jack-jump-eyebrow game-category">Drag Challenge</p>
            <h1 class="game-title">Guide Jack To Safety</h1>
          </div>
        </header>

        <p class="jack-jump-copy game-instructions">Drag Jack along the path, jump over the candle, and land on the glowing target.</p>

        <section class="game-stats" aria-live="polite">
          <div class="game-stat">
            <span class="label">Level</span>
            <span id="jackLevelBadge" class="value jack-level-badge">Level 1 of 6</span>
          </div>
        </section>

        <section class="jack-jump-scene game-stage" id="jackScene" aria-label="Play area">
          <div class="jack-room-windows" aria-hidden="true">
            <span class="jack-window"></span>
            <span class="jack-window"></span>
            <span class="jack-window"></span>
          </div>

          <div class="jack-path-dots" id="jackPathDots" aria-hidden="true"></div>

          <div id="jackLevelOverlay" class="jack-level-overlay" role="status" aria-live="polite" hidden></div>

          <div class="jack-goal" id="jackGoal" aria-hidden="true">
            <span class="jack-goal-ring"></span>
            <span class="jack-goal-label">LAND HERE</span>
          </div>

          <img id="candleObstacle" class="jack-candle" src="images/candle.png" alt="Candle obstacle" draggable="false" />

          <div class="jack-character-wrap" id="jackWrap" aria-live="polite">
            <img id="jackCharacter" class="jack-character" src="images/jack.png" alt="Jack" draggable="false" />
            <span class="jack-shadow" aria-hidden="true"></span>
          </div>
        </section>

        <p id="jackStatus" class="jack-status game-preserve-only">Move your cursor to Jack's start point.</p>

        <section class="pad-dock jack-trackpad-dock game-guide" aria-label="Trackpad Guide">
          <p class="pad-label">Trackpad Guide</p>
          <section id="scene" class="scene" aria-label="Interactive trackpad trainer">
            <img class="trackpad" src="images/trackpad.png" alt="Trackpad" draggable="false" />
            <img id="leftHand" class="hand left-hand" src="images/left-hand-transparent.png" alt="Left hand" draggable="false" />
            <img id="rightHand" class="hand right-hand" src="images/right-hand-transparent.png" alt="Right hand" draggable="false" />
            <div id="pressIndicator" class="press-indicator" aria-hidden="true"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="game-access.js"></script>
    <script src="movement-mode.js"></script>
    <script src="trackpad-guide.js"></script>
    <script src="jack-jump.js"></script>
  </body>
</html>
